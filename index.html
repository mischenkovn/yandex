    <!-- Яндекс.Метрика (ваш существующий код) -->

        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=110303584', 'ym');

<body>
    <h1>Статистика сайта</h1>
    <div id="stats">Загрузка...</div>

    <script>
        // --- НАСТРОЙКИ (замените на свои!) ---
        const OAUTH_TOKEN = 'y0__wgBEOv7s7wIGLbZRCCp84iPGDDApvmmCFffNfAguu5YuVECHZX-4ursFr8u'; // Токен, полученный на шаге 1
        const COUNTER_ID = '110303584'; // ID вашего счётчика Метрики
        // -------------------------------------

        // Формируем URL для запроса к API. 
        // presets=sources_summary - запрашиваем сводку по источникам трафика
        const apiUrl = `https://api-metrika.yandex.net/stat/v1/data?preset=sources_summary&id=${COUNTER_ID}`;

        // Выполняем запрос к API
        fetch(apiUrl, {
            headers: {
                // Передаём токен в заголовке Authorization
                "Authorization": `OAuth ${OAUTH_TOKEN}`
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`Ошибка HTTP: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            // Обрабатываем полученные данные
            renderStats(data);
        })
        .catch(error => {
            console.error('Ошибка при запросе к API:', error);
            document.getElementById('stats').innerHTML = `<p style="color: red;">Ошибка загрузки данных: ${error.message}</p>`;
        });

        // Функция для отображения данных
        function renderStats(data) {
            const container = document.getElementById('stats');
            
            // Проверяем, есть ли данные
            if (!data.data || data.data.length === 0) {
                container.innerHTML = '<p>Нет данных для отображения.</p>';
                return;
            }

            // Строим простую таблицу
            let tableHtml = '<table><thead><tr>';
            // Заголовки из запроса
            data.query.dimensions.forEach(dim => {
                tableHtml += `<th>${dim.name}</th>`;
            });
            data.query.metrics.forEach(metric => {
                tableHtml += `<th>${metric.name}</th>`;
            });
            tableHtml += '</tr></thead><tbody>';

            // Строки с данными
            data.data.forEach(row => {
                tableHtml += '<tr>';
                row.dimensions.forEach(dim => {
                    tableHtml += `<td>${dim.name}</td>`;
                });
                row.metrics.forEach(metric => {
                    tableHtml += `<td>${metric}</td>`;
                });
                tableHtml += '</tr>';
            });

            tableHtml += '</tbody></table>';
            container.innerHTML = tableHtml;
        }
    </script>

    <!-- Инициализация VK Mini App -->
    <script>
        (function() {
            // Проверяем, доступен ли VK Bridge
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send('VKWebAppInit', {})
                    .then(() => {
                        console.log('✅ VK Mini App инициализирован');
                    })
                    .catch((error) => {
                        console.error('❌ Ошибка инициализации VK Bridge:', error);
                    });
            } else {
                console.warn('⚠️ VK Bridge не загружен – приложение запущено вне VK');
            }
        })();
    </script>
</body>
